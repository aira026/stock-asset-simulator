<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零股資產試算器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #f0f0f4;
    --text2: #8b8b9e;
    --text3: #555566;
    --accent: #4f8ef7;
    --accent-dim: #1a2d52;
    --green: #2ecc87;
    --green-dim: #0d3324;
    --amber: #f5a623;
    --amber-dim: #3a2800;
    --red: #f75f5f;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --font: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  /* Header */
  .header {
    padding: 2.5rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    max-width: 900px;
    margin: 0 auto;
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: .6rem;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -.02em;
    line-height: 1.2;
    margin-bottom: .4rem;
  }
  .header p {
    font-size: .875rem;
    color: var(--text2);
    line-height: 1.6;
  }

  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

  /* Sections */
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-bottom: .875rem;
  }

  /* Param grid */
  .param-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .75rem;
  }
  @media(max-width:600px){ .param-grid{ grid-template-columns:1fr; } }

  .param-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .875rem 1rem;
  }
  .param-label {
    font-size: .75rem;
    color: var(--text2);
    margin-bottom: .5rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .param-label .hint {
    font-size: .65rem;
    color: var(--text3);
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .param-value {
    font-size: 1.3rem;
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--text);
    margin-bottom: .625rem;
    letter-spacing: -.01em;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    height: 3px;
    cursor: pointer;
  }

  /* Bonus events */
  .bonus-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .bonus-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: .5rem;
    align-items: end;
    margin-bottom: .5rem;
  }
  .bonus-row:last-child { margin-bottom: 0; }
  .field-label { font-size: .72rem; color: var(--text2); margin-bottom: .3rem; }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .875rem;
    padding: .45rem .65rem;
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  .field-input:focus { border-color: var(--accent); }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: .8rem;
    padding: .45rem .75rem;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-add {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-size: .78rem;
    padding: .4rem .9rem;
    margin-top: .5rem;
    display: inline-flex;
    align-items: center;
    gap: .3rem;
  }
  .btn-add:hover { background: var(--accent); color: #fff; }
  .btn-remove {
    background: transparent;
    border-color: var(--border);
    color: var(--text3);
    padding: .45rem .6rem;
    font-size: 1rem;
    line-height: 1;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); }

  /* Metric cards */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: .75rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .metric.accent { border-color: var(--accent); background: var(--accent-dim); }
  .metric.green { border-color: var(--green); background: var(--green-dim); }
  .metric-label { font-size: .7rem; color: var(--text2); margin-bottom: .3rem; }
  .metric.accent .metric-label { color: #7aaeff; }
  .metric.green .metric-label { color: #5de8a8; }
  .metric-val {
    font-size: 1.35rem;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -.02em;
  }
  .metric.accent .metric-val { color: var(--accent); }
  .metric.green .metric-val { color: var(--green); }
  .metric-sub { font-size: .7rem; color: var(--text3); margin-top: .25rem; }
  .metric.accent .metric-sub { color: #5a83cc; }
  .metric.green .metric-sub { color: #2a8a60; }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1rem;
    font-size: .75rem;
    color: var(--text2);
  }
  .chart-legend span { display: flex; align-items: center; gap: .4rem; }
  .leg-line {
    width: 24px;
    height: 2px;
    display: inline-block;
    border-radius: 1px;
  }
  canvas { width: 100% !important; }

  /* Target selector */
  .target-row {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .target-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: .78rem;
    padding: .35rem .9rem;
    cursor: pointer;
    transition: all .15s;
  }
  .target-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .target-btn:hover:not(.active) { border-color: var(--text2); color: var(--text); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-header {
    padding: .875rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: .75rem;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  th {
    text-align: left;
    font-weight: 500;
    color: var(--text3);
    font-size: .68rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: .5rem .875rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  td {
    padding: .45rem .875rem;
    border-bottom: 1px solid #1c1c22;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr.row-hit td { background: #0d2040; color: var(--accent); font-weight: 600; }
  tr.row-bonus td { background: #2a1e00; }
  .badge {
    display: inline-block;
    font-size: .65rem;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: var(--font-mono);
  }
  .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid #1a5e3a; }
  .badge-blue { background: var(--accent-dim); color: var(--accent); border: 1px solid #1e3d7a; }
  .badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid #5a3a00; }

  /* Compound breakdown */
  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }
  .breakdown-title {
    font-size: .7rem;
    color: var(--text3);
    letter-spacing: .08em;
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: .875rem;
  }
  .br-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: .6rem;
  }
  .br-row:last-child { margin-bottom: 0; }
  .br-label { font-size: .75rem; color: var(--text2); min-width: 90px; }
  .br-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .br-bar { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .br-val { font-size: .75rem; font-family: var(--font-mono); color: var(--text2); min-width: 80px; text-align: right; }
  .breakdown-note {
    font-size: .72rem;
    color: var(--text3);
    margin-top: .75rem;
    line-height: 1.6;
    padding-top: .75rem;
    border-top: 1px solid var(--border);
  }
  .breakdown-note em { color: var(--accent); font-style: normal; }

  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">零股資產試算器</div>
  <h1> 你的資產沙盤推演 </h1>
  <p>設定你的股票參數與每月投入，加入任意單月特別注資（年終、獎金、還款等），<br>即時試算資產達標時間與複利組成。</p>
</div>

<div class="main">

  <!-- 基本參數 -->
  <div class="section">
    <div class="section-title">基本參數</div>
    <div class="param-grid">
      <div class="param-card">
        <div class="param-label">目前持有股數<span class="hint">股</span></div>
       <div class="param-value" id="vShares">—</div>
       <input type="range" id="rShares" min="0" max="1000" value="0" step="1">
      </div>
      <div class="param-card">
        <div class="param-label">目前股價<span class="hint">元</span></div>
        <div class="param-value" id="vPrice">2,350</div>
        <input type="range" id="rPrice" min="500" max="5000" value="2350" step="10">
      </div>
      <div class="param-card">
        <div class="param-label">每月固定投入<span class="hint">元</span></div>
        <div class="param-value" id="vMonthly">—</div>
        <input type="range" id="rMonthly" min="1000" max="100000" value="1000" step="500">
<input type="range" id="rMonthly" min="1000" max="100000" value="1000" step="500">
      </div>
      <div class="param-card">
        <div class="param-label">年化報酬率<span class="hint">%</span></div>
        <div class="param-value" id="vRate">22</div>
        <input type="range" id="rRate" min="3" max="50" value="22" step="1">
      </div>
    </div>
  </div>

  <!-- 目標金額 -->
  <div class="section">
    <div class="section-title">目標金額</div>
    <div class="target-row" id="targetRow">
      <button class="target-btn active" data-val="1000000">100 萬</button>
      <button class="target-btn" data-val="3000000">300 萬</button>
      <button class="target-btn" data-val="5000000">500 萬</button>
      <button class="target-btn" data-val="10000000">1,000 萬</button>
      <button class="target-btn" data-val="21000000">2,100 萬（財富自由）</button>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <span style="font-size:.78rem;color:var(--text2)">自訂目標（元）</span>
      <input class="field-input" id="customTarget" type="number" placeholder="例：2000000" style="max-width:200px;font-size:.85rem">
      <button class="btn" onclick="applyCustomTarget()">套用</button>
    </div>
  </div>

  <!-- 特別注資 -->
  <div class="section">
    <div class="section-title">單月特別注資 <span style="font-size:.65rem;color:var(--text3);letter-spacing:0;text-transform:none">年終獎金、還款、任意加碼</span></div>
    <div class="bonus-section">
      <div id="bonusList"></div>
      <button class="btn btn-add" onclick="addBonus()">＋ 新增注資</button>
    </div>
  </div>

  <!-- 摘要卡 -->
  <div class="section">
    <div class="section-title">試算結果</div>
    <div class="metric-grid" id="metrics"></div>
  </div>

  <!-- 圖表 -->
  <div class="section">
    <div class="chart-wrap">
      <div class="chart-legend">
        <span><b class="leg-line" style="background:#4f8ef7"></b>含特別注資</span>
        <span><b class="leg-line" style="background:#555566;border-top:2px dashed #555566;background:none"></b>不含注資</span>
        <span><b class="leg-line" style="background:#f75f5f;border-top:2px dashed #f75f5f;background:none"></b>目標線</span>
      </div>
      <div style="position:relative;height:280px">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <!-- 複利組成 -->
  <div class="section">
    <div class="breakdown" id="breakdown"></div>
  </div>

  <!-- 逐月表格 -->
  <div class="section">
    <div class="table-wrap">
      <div class="table-header">
        <span>逐月沙盤推演</span>
        <span id="tableRange" style="color:var(--text3)"></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>月份</th>
              <th>估計股價</th>
              <th>固定買入</th>
              <th>特別注資</th>
              <th>新增股數</th>
              <th>累積股數</th>
              <th>資產估值</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const f = n => Math.round(n).toLocaleString('zh-TW');
const fm = n => n >= 1e6 ? '$' + (n/1e6).toFixed(2) + 'M' : '$' + (n/10000).toFixed(1) + '萬';

let target = 1000000;
let bonuses = [];
let chartInst = null;
let bonusId = 0;

// Init bonus list
function renderBonusList() {
  const el = document.getElementById('bonusList');
  el.innerHTML = '';
  bonuses.forEach((b, i) => {
    const row = document.createElement('div');
    row.className = 'bonus-row';
    row.innerHTML = `
      <div>
        <div class="field-label">說明</div>
        <input class="field-input" value="${b.label}" oninput="bonuses[${i}].label=this.value;compute()" placeholder="例：年終獎金">
      </div>
      <div>
        <div class="field-label">年 / 月</div>
        <div style="display:flex;gap:.35rem">
          <input class="field-input" type="number" value="${b.year}" min="2024" max="2060" oninput="bonuses[${i}].year=+this.value;compute()" style="width:72px">
          <input class="field-input" type="number" value="${b.month}" min="1" max="12" oninput="bonuses[${i}].month=+this.value;compute()" style="width:52px">
        </div>
      </div>
      <div>
        <div class="field-label">金額（元）</div>
        <input class="field-input" type="number" value="${b.amount}" oninput="bonuses[${i}].amount=+this.value;compute()" placeholder="50000">
      </div>
      <button class="btn btn-remove" onclick="removeBonus(${i})">✕</button>
    `;
    el.appendChild(row);
  });
}

function addBonus() {
  const now = new Date();
  bonuses.push({ year: now.getFullYear(), month: now.getMonth() + 1, amount: 50000, label: '獎金' });
  renderBonusList();
  compute();
}

function removeBonus(i) {
  bonuses.splice(i, 1);
  renderBonusList();
  compute();
}

// Slider bindings
const sliders = [
  { r: 'rShares', v: 'vShares', fmt: n => n + ' 股' },
  { r: 'rPrice',  v: 'vPrice',  fmt: n => (+n).toLocaleString('zh-TW') + ' 元' },
  { r: 'rMonthly',v: 'vMonthly',fmt: n => (+n).toLocaleString('zh-TW') + ' 元' },
  { r: 'rRate',   v: 'vRate',   fmt: n => n + ' %' },
];
sliders.forEach(({r,v,fmt}) => {
  document.getElementById(r).addEventListener('input', function(){
    document.getElementById(v).textContent = fmt(this.value);
    compute();
  });
});

// Target buttons
document.getElementById('targetRow').addEventListener('click', e => {
  const btn = e.target.closest('.target-btn');
  if (!btn) return;
  document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  target = +btn.dataset.val;
  document.getElementById('customTarget').value = '';
  compute();
});

function applyCustomTarget() {
  const v = +document.getElementById('customTarget').value;
  if (!v || v < 1000) return;
  target = v;
  document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('active'));
  compute();
}

function getBonusForMonth(year, month) {
  return bonuses.filter(b => b.year === year && b.month === month).reduce((s,b) => s + b.amount, 0);
}

function compute() {
  const shares0 = +document.getElementById('rShares').value;
  const price0  = +document.getElementById('rPrice').value;
  const monthly = +document.getElementById('rMonthly').value;
  const annRate = +document.getElementById('rRate').value / 100;
  const mr = Math.pow(1 + annRate, 1/12) - 1;

  // figure out how many months to simulate: enough to hit target or at least 60
  const BASE_MONTHS = 60;
  const MAX_MONTHS  = 360;

  let shares = shares0, sharesNB = shares0;
  let price = price0, priceNB = price0;
  let hit = null, hitNB = null;
  const rows = [], labArr = [], wB = [], woB = [];
  let totalCashIn = shares0 * price0;
  const startDate = new Date(2026, 5, 1); // June 2026

  let months = BASE_MONTHS;
  // pre-scan to find hit
  {
    let s = shares0, p = price0, m = monthly;
    for (let i = 1; i <= MAX_MONTHS; i++) {
      p *= (1 + mr);
      const d = new Date(startDate); d.setMonth(d.getMonth() + i);
      const bonus = getBonusForMonth(d.getFullYear(), d.getMonth() + 1);
      const ns = Math.floor((m + bonus) / p);
      s += ns;
      if (s * p >= target && months < i + 6) months = Math.min(i + 6, MAX_MONTHS);
      if (s * p >= target && !hit) { hit = i; break; }
    }
    months = Math.max(months, BASE_MONTHS);
  }

  for (let i = 1; i <= months; i++) {
    price  *= (1 + mr);
    priceNB *= (1 + mr);
    const d = new Date(startDate); d.setMonth(d.getMonth() + i);
    const yr = d.getFullYear(), mo = d.getMonth() + 1;
    const lbl = yr + '/' + String(mo).padStart(2,'0');
    const bonus = getBonusForMonth(yr, mo);

    const totalCash = monthly + bonus;
    const ns = Math.floor(totalCash / price);
    shares += ns;
    const av = shares * price;

    const nsNB = Math.floor(monthly / priceNB);
    sharesNB += nsNB;
    const avNB = sharesNB * priceNB;

    totalCashIn += totalCash;
    labArr.push(lbl);
    wB.push(Math.round(av));
    woB.push(Math.round(avNB));

    const isHit = (i === (hit ?? -1));
    const hitNBi = (!hitNB && avNB >= target) ? i : null;
    if (hitNBi) hitNB = hitNBi;

    rows.push({ i, lbl, yr, mo, price, monthly, bonus, ns, shares, av, isHit, isBonus: bonus > 0 });
  }

  const iv = shares0 * price0;
  const finalAv = wB[wB.length - 1];
  const gainTotal = Math.max(0, finalAv - totalCashIn);
  const bonusTotal = bonuses.reduce((s,b)=>s+b.amount,0);
  const regularIn = totalCashIn - iv - bonusTotal;

  // Metrics
  const hitRow = hit ? rows[hit - 1] : null;
  const earlyMonths = (hit && hitNB) ? (hitNB - hit) : null;
  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">目前資產估值</div>
      <div class="metric-val">$${f(iv)}</div>
      <div class="metric-sub">${shares0}股 × $${f(price0)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">距目標差距</div>
      <div class="metric-val">${iv >= target ? '已達成' : '$' + f(target - iv)}</div>
      <div class="metric-sub">目標 $${f(target)}</div>
    </div>
    <div class="metric ${hitRow ? 'accent' : ''}">
      <div class="metric-label">預估達標月份</div>
      <div class="metric-val">${hitRow ? hitRow.lbl : hit ? rows[hit-1].lbl : '超出試算範圍'}</div>
      <div class="metric-sub">${hit ? '約 ' + hit + ' 個月後（' + (24 + Math.floor(hit/12)) + '歲）' : ''}</div>
    </div>
    ${earlyMonths ? `<div class="metric green">
      <div class="metric-label">因特別注資提早</div>
      <div class="metric-val">${earlyMonths} 個月</div>
      <div class="metric-sub">注資共 $${f(bonusTotal)}</div>
    </div>` : `<div class="metric">
      <div class="metric-label">達標時股數</div>
      <div class="metric-val">${hitRow ? hitRow.shares + ' 股' : '—'}</div>
      <div class="metric-sub">${hitRow ? '股價約 $' + f(hitRow.price) : ''}</div>
    </div>`}
  `;

  // Breakdown
  const pcts = [iv, regularIn, bonusTotal, gainTotal].map(v => Math.round(v / finalAv * 100));
  const items = [
    { label:'原始本金', color:'#4f8ef7', pct:pcts[0], val:iv },
    { label:'每月投入', color:'#2ecc87', pct:pcts[1], val:regularIn },
    { label:'特別注資', color:'#f5a623', pct:pcts[2], val:bonusTotal },
    { label:'複利增值', color:'#f75f5f', pct:Math.max(0,100-pcts[0]-pcts[1]-pcts[2]), val:gainTotal },
  ];
  const compoundPct = Math.max(0, 100 - pcts[0] - pcts[1] - pcts[2]);
  document.getElementById('breakdown').innerHTML = `
    <div class="breakdown-title">複利組成拆解（試算期末）</div>
    ${items.map(it => `
    <div class="br-row">
      <span class="br-label">${it.label}</span>
      <div class="br-bar-wrap"><div class="br-bar" style="width:${it.pct}%;background:${it.color}"></div></div>
      <span class="br-val">$${f(it.val)}</span>
    </div>`).join('')}
    <div class="breakdown-note">
      目前複利增值佔資產 <em>${compoundPct}%</em>。
      當這個數字超過 <em>40%</em>，你才會真正感受到「錢在幫你賺錢」的加速感。
      這個時間點大概落在資產 <em>150–200 萬</em>以後。
    </div>
  `;

  // Table
  document.getElementById('tableRange').textContent = `共 ${months} 個月試算`;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    if (r.isHit) tr.className = 'row-hit';
    else if (r.isBonus) tr.className = 'row-bonus';
    const tags = [];
    if (r.isHit) tags.push(`<span class="badge badge-blue">🎯 達標</span>`);
    if (r.isBonus) tags.push(`<span class="badge badge-amber">${bonuses.filter(b=>b.year===r.yr&&b.month===r.mo).map(b=>b.label).join('/')}</span>`);
    tr.innerHTML = `
      <td>${r.lbl}</td>
      <td>$${f(r.price)}</td>
      <td>$${f(r.monthly)}</td>
      <td>${r.bonus ? '<span style="color:var(--amber)">+$' + f(r.bonus) + '</span>' : '—'}</td>
      <td>+${r.ns}</td>
      <td>${f(r.shares)}</td>
      <td>$${f(r.av)}</td>
      <td>${tags.join(' ')}</td>
    `;
    tbody.appendChild(tr);
  });

  // Chart
  const dark = true;
  const gc = 'rgba(255,255,255,.05)';
  const tc = '#555566';
  const tgt = labArr.map(() => target);
  const skipN = Math.max(1, Math.floor(months / 24));
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: labArr,
      datasets: [
        { label:'含注資', data:wB, borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,.06)', fill:true, tension:.4, pointRadius:0, borderWidth:2 },
        { label:'不含注資', data:woB, borderColor:'#333345', borderWidth:1.5, borderDash:[4,3], pointRadius:0, fill:false, tension:.4 },
        { label:'目標', data:tgt, borderColor:'#f75f5f', borderWidth:1, borderDash:[8,4], pointRadius:0, fill:false },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: c => c.dataset.label + ': $' + c.parsed.y.toLocaleString('zh-TW') } }
      },
      scales: {
        x: {
          ticks: { color:tc, font:{size:10}, maxRotation:45, callback:(v,i) => i % skipN === 0 ? labArr[i] : '' },
          grid: { color:gc }
        },
        y: {
          ticks: { color:tc, font:{size:10}, callback: v => v>=1e6 ? '$'+(v/1e6).toFixed(1)+'M' : '$'+(v/10000).toFixed(0)+'萬' },
          grid: { color:gc }
        }
      }
    }
  });
}

// Init
renderBonusList();
compute();
</script>
</body>
</html>
